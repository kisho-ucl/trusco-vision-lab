<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Clip Annotation</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="topbar-left">
      <button class="btn icon-btn" id="prevClip">&#8592;</button>
      <span class="clip-counter" id="clipCounter">– / –</span>
      <button class="btn icon-btn" id="nextClip">&#8594;</button>
    </div>
    <div class="topbar-center">
      <div class="progress-wrap">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="progress-label" id="progressLabel">0 / 0 labeled</span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-save" id="saveBtn">Save</button>
      <button class="btn" id="exportBtn">Export JSONL</button>
    </div>
  </header>

  <div class="workspace">

    <div class="viewer-col">
      <div class="viewer-wrap">
        <img class="frame-img" id="frameImg" alt="">
        <div class="frame-counter" id="frameCounter">Frame 1 / 1</div>
      </div>

      <div class="timeline-section">
        <div class="segment-bars" id="segmentBars"></div>
        <div class="timeline-track" id="timelineTrack">
          <div class="timeline-ticks" id="timelineTicks"></div>
          <div class="playhead" id="playhead"></div>
        </div>
        <div class="timeline-actions">
          <button class="btn btn-sm" id="addBoundaryBtn">+ Add boundary</button>
          <button class="btn btn-sm" id="delBoundaryBtn">× Del boundary</button>
        </div>
      </div>
    </div>

    <aside class="meta-col">
      <div class="clip-id" id="clipId">–</div>
      <dl class="meta-list" id="metaList"></dl>

      <div class="divider"></div>

      <div class="label-section">
        <span class="section-title">Labels</span>
        <div class="label-buttons" id="labelButtons"></div>
      </div>

      <div class="note-section">
        <label class="section-title" for="noteInput">Note (segment)</label>
        <textarea id="noteInput" rows="3" placeholder="Observations..."></textarea>
      </div>
    </aside>

  </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
